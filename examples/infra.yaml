  #       - "sysctl -w net.ipv4.ip_forward=1"
  #       - "swapoff -a"

  # --- Workers ---------------------------------------------------------------
  - name: k8s-wrk-01
    vcpus: 4
    memory_mb: 8192
    disk_gb: 100
    networks:
      - name: mgmt
        ip: 10.10.0.20
      - name: workload
        ip: 10.20.0.20
      - name: storage
        ip: 10.30.0.20
    cloud_init:
      runcmd:
        - "sysctl -w net.ipv4.ip_forward=1"
        - "swapoff -a"

  # - name: k8s-wrk-02
  #   vcpus: 4
