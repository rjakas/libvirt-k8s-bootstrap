  # --- Utility node (on external bridge) -------------------------------------
  - name: bastion-01
    vcpus: 1
    memory_mb: 2048
    disk_gb: 30
    networks:
      - name: external                             # gets IP from physical DHCP
      - name: mgmt
        ip: 10.10.0.5
    cloud_init:
      packages:
        - wireguard
        - nginx