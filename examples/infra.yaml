# =============================================================================
# Infrastructure Definition
# =============================================================================
# This file defines networks and VMs to be provisioned on the L0 host.
# Secrets (SSH keys, passwords) are injected via environment variables at
# runtime — never commit secrets to this file.
#
# Environment variables referenced:
#   VM_SSH_PUBKEY       - SSH public key injected into all VMs (required)
#   VM_DEFAULT_PASSWORD - Fallback password for console access (optional)
# =============================================================================

---
# -- Global defaults (inherited by all VMs unless overridden) -----------------
defaults:
  os_variant: ubuntu24.04                          # libosinfo short-id
  base_image: /var/lib/libvirt/images/base/ubuntu-24.04-server-cloudimg-amd64.img
  vcpus: 2
  memory_mb: 2048
  disk_gb: 20
  disk_pool: /var/lib/libvirt/images               # qcow2 storage dir
  user: ops                                        # cloud-init default user
  timezone: UTC
  locale: en_US.UTF-8
  packages:                                        # installed on all VMs
    - qemu-guest-agent
    - curl
    - jq
  runcmd: []                                       # commands run on first boot

# -- Networks -----------------------------------------------------------------
# Each entry creates a libvirt virtual network via virsh net-define.
# Types: nat, route, isolated, bridge (pre-existing bridge on host)
networks:
  - name: mgmt
    type: nat
    bridge: virbr-mgmt
    subnet: 10.10.0.0/24
    gateway: 10.10.0.1
    dhcp:
      start: 10.10.0.100
      end: 10.10.0.199
    dns:
      domain: mgmt.lab
      forwarders:
        - 1.1.1.1
        - 8.8.8.8

  - name: workload
    type: nat
    bridge: virbr-wl
    subnet: 10.20.0.0/24
    gateway: 10.20.0.1
    dhcp:
      start: 10.20.0.100
      end: 10.20.0.199
    dns:
      domain: workload.lab
      forwarders:
        - 1.1.1.1

  - name: storage
    type: isolated                                  # no NAT, inter-VM only
    bridge: virbr-stor
    subnet: 10.30.0.0/24
    gateway: 10.30.0.1
    dhcp:
      start: 10.30.0.100
      end: 10.30.0.199

  - name: external
    type: bridge                                    # pre-existing host bridge
    bridge: br0                                     # must exist on L0 host

# -- Virtual Machines ---------------------------------------------------------
# Each VM references one or more networks defined above.
# Per-VM fields override global defaults.
vms:
  # --- Control plane ---------------------------------------------------------
  - name: k8s-cp-01
    vcpus: 4
    memory_mb: 4096
    disk_gb: 50
    networks:
      - name: mgmt
        ip: 10.10.0.10
        mac: "52:54:00:a1:00:10"
      - name: workload
        ip: 10.20.0.10
    cloud_init:
      packages:
        - apt-transport-https
        - ca-certificates
        - gnupg
      runcmd:
        - "sysctl -w net.ipv4.ip_forward=1"
        - "swapoff -a"

  # - name: k8s-cp-02
  #   vcpus: 4
  #   memory_mb: 8192
  #   disk_gb: 50
